<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./assets/css/estilos.css">
</head>

<body>
    <main class="container bg-light">
        <h1 class="row mt-1 p-5">Agenda de Contactos</h1>
        <section class="row bg-white p-4 m-2" id="formulario">
            <h4>Contacto</h4>
            <form action="" class="d-flex flex-wrap justify-content-between gap-1">
                <input type="hidden" id="idcontacto">
                <div class="mb-3 col-5">
                    <input type="text" class="form-control" id="nombre" placeholder="Nombre">
                </div>
                <div class="mb-3 col-5">
                    <input type="tel" class="form-control" id="telefono" placeholder="Teléfono">
                </div>
                <div class="mb-3 col-5">
                    <input type="email" class="form-control" id="email" placeholder="Email">
                </div>
                <div class="mb-3 col-5">
                    <input type="text" class="form-control" id="empresa" placeholder="Empresa">
                </div>
                <div class="mb-3 col-12">
                    <button type="button" class="btn btn-primary" onclick="nuevoContacto('n')">Añadir</button>
                    <button type="button" class="btn btn-success" onclick="nuevoContacto('u')">Añadir urgente</button>
                    <button type="button" class="btn btn-warning" onclick="borrarContacto('u')">Deshacer último</button>
                    <button type="button" class="btn btn-dark" onclick="borrarContacto('p')">Deshacer primero</button>
                    <button type="button" class="btn btn-warning" onclick="modificarContacto()">Modificar contacto</button>
                    <button type="button" class="btn btn-danger" onclick="borrarContactoSeleccionado()">Eliminar seleccionado</button>
                    <button type="reset" class="btn btn-info">Limpiar</button>
                </div>
            </form>
        </section>
        <section class="row p-4 m-2" id="lista">
            <h4>Lista de Contactos</h4>
            <table class="table col-12 table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Empresa</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>
    <script src="./assets/js/scripts.js"></script>
</body>

</html>
