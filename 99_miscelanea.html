<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {margin:0; padding:0; box-sizing: border-box;}
        section {margin:60px auto;display:flex;flex-wrap: wrap; width:300px}
        div {width: 100px; height: 100px; border:2px solid grey}
    </style>
</head>

<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
    <script>
        //queryselectorall devuelve un nodeList de elementos estáticos
        //getElementsByTagName devuelve un HTMLCollection dinámica
        //con Array.from se convierte la colección en array
        
        const divs = document.getElementsByTagName('div')
        
        Array.from(divs).forEach(div => div.addEventListener('click', buscarElemento))

        function buscarElemento(ev) {
            const elemento = ev.target;
            const indice = Array.from(elemento.parentNode.children).indexOf(elemento);
            console.log(indice);
        }

        document.getElementsByTagName('section')[0].insertAdjacentHTML('beforeEnd', '<div></div>')
    </script>
</body>

</html>
