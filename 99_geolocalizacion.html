<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        iframe {display:block;margin:auto}
    </style>
</head>

<body>
    <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d2991.7917735734054!2d2.1779091758804943!3d41.42203857129542!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zNDHCsDI1JzE5LjMiTiAywrAxMCc0OS43IkU!5e0!3m2!1ses!2ses!4v1774956384416!5m2!1ses!2ses" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    
    <script>
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(position => {
                console.log("Latitud: " + position.coords.latitude);
                console.log("Longitud: " + position.coords.longitude);
            }, error => {
                console.error("Error al obtener ubicación: " + error.message);
            });
        } else {
            console.log("Geolocalización no soportada");
        }

    </script>
</body>

</html>
