<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script> 
        let num = Math.floor(Math.random() * 1000) + 1;
        let i = 1;
        console.log('Número inicial: ' + num);

        while (num > 1) {                               
            if (num % 2 === 0) {
                num = num / 2;
                console.log(i + ' num par: ' + num);
            } else {
                num = 3 * num + 1;
                console.log(i +' num impar: ' + num);
            }

            i++
        }
    </script>
</body>
</html>
